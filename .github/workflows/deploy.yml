name: Deploy via Tailscale + OpenSSH

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-autodeploy-ci

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 | ssh-keygen -lf - -E sha256
          ssh-keyscan -H ${{ secrets.SERVER_TS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Windows server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o IdentitiesOnly=yes \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_TS_IP }}" \
              powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass \
              -File D:/TutorDex.autodeploy/scripts/trigger_windows_autodeploy.ps1
