modules:
  http_2xx:
    prober: http
    timeout: 15s
    http:
      method: GET
      preferred_ip_protocol: ip4
      follow_redirects: true
      # Internal Python health servers may respond with HTTP/1.0.
      valid_http_versions: ["HTTP/1.0", "HTTP/1.1", "HTTP/2.0"]

  http_2xx_tutordex_lan_sni:
    prober: http
    timeout: 15s
    http:
      method: GET
      preferred_ip_protocol: ip4
      follow_redirects: true
      valid_http_versions: ["HTTP/1.0", "HTTP/1.1", "HTTP/2.0"]
      headers:
        Host: tutordex-api.duckdns.org
      tls_config:
        server_name: tutordex-api.duckdns.org
        insecure_skip_verify: true

  tcp_connect:
    prober: tcp
    timeout: 5s
