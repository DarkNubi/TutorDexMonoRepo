global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert_rules.yml
  - /etc/prometheus/recording_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: blackbox_http_public
    metrics_path: /probe
    scrape_interval: 60s
    scrape_timeout: 20s
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://tutordex-api.duckdns.org/health
          - https://tutordex-api.duckdns.org/health/dependencies
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: tutordex_collector
    metrics_path: /metrics
    scrape_timeout: 10s
    scrape_protocols: [PrometheusText0.0.4]
    static_configs:
      - targets: ["tutordex-prod-collector-tail-1:9001"]
        labels:
          component: collector

  - job_name: tutordex_worker
    metrics_path: /metrics
    scrape_timeout: 10s
    scrape_protocols: [PrometheusText0.0.4]
    static_configs:
      - targets: ["tutordex-prod-aggregator-worker-1:9002"]
        labels:
          component: worker

  - job_name: tutordex_backend
    metrics_path: /metrics
    scrape_timeout: 10s
    scrape_protocols: [PrometheusText0.0.4]
    static_configs:
      - targets: ["tutordex-prod-backend-1:8000"]
        labels:
          component: backend
